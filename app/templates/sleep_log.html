{% extends "authenticated-base.html" %}

{% block title %}Sleep Tracker{% endblock %}

{% block internal_css %}
<style>
    .sleep-card{
        background: #1e1e1e;
        color: white;
        padding: 20px;
        padding-bottom: 5px;
        border-radius: 15px;
        width: 350px;
        justify-self: center;
        margin-top: 100px;
        margin-bottom: 100px;
    }

    /* .progress-container {
        width: 100%;
        height: 20px;
        background: #333;
        border-radius: 10px;
        margin-top: 15px;
        overflow: hidden;
        margin-bottom: 17px;
    }

    #progress-bar {
        height: 100%;
        width: 0%;
        background: #4da6ff;
        border-radius: 10px;
        transition: width 0.3s ease;

    button{
        padding: 5px 20px;
        border-radius: 30px;
        border: none;
        background: #333;
        color: white;
        cursor: pointer;
        margin-top: 10px;
    }

    #sleep-input{
        width: 100%;
        border: none;
        border-bottom: 2px solid #555;
        cursor: pointer;
        margin-top: 15px;
        background: transparent;
        color: white;
        padding: 8px 0;
        outline: none;
        caret-color: white;
    }

    #sleep-input::placeholder {
        color: #888;
    }
</style>
{% endblock %}

{% block subpage_content %}
    <!-- <script src="/static/js/highcharts.js"></script> -->
    
    <div class="sleep-card">
        <h2 id="sleep-text"><i class="fa-solid fa-bed"></i></i> Hours Slept</h2>

        <input type="number" id="sleep-input" placeholder=" Enter Hours Slept" min="0" step="0.5">
        <button onclick="addSleep()">Save</button>
        
<!-- 
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div> -->

        <hr>
        <p style="justify-self: center;">
            <a href="/sleep-stats" style="color: white; text-decoration-line: none;">View Weekly Stats</a>
        </p>
    </div>

    <script>
        async function addSleep() {
            let input = document.getElementById("sleep-input");
            let hours = input.value;

            if (hours === "" || hours <= 0) {
                alert("Enter valid hours");
                return;
            }

            await fetch(`/sleep/add?hours=${hours}`, {method: "POST", credentials: "include"});
            input.value = "";
        }

        document.getElementById("sleep-input").addEventListener("keypress", function(e) {
            if (e.key ==="Enter") {
                addSleep();
            }
        });

    </script>
{% endblock %}
