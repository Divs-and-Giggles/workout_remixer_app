<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routines</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffffff;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #ddd;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
}

/* CONTAINER */
.container {
    padding: 20px 40px;
}

/* SEARCH */
.search-bar {
    margin-bottom: 20px;
}

.search-bar input {
    padding: 10px;
    width: 250px;
}

/* GRID */
.routine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 15px;
    transition: 0.2s;
}

.card:hover {
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* TITLE */
.card h3 {
    margin: 0 0 10px 0;
}

/* TAG */
.tag {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 10px;
}

.beginner { background: #d4f8d4; }
.intermediate { background: #fff3cd; }
.advanced { background: #f8d7da; }
.elite { background: #d1ecf1; }

/* BUTTONS */
button {
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.view-button { background: #000; color: white; }
.rename-button { background: #eee; }
.release-button { background: #ff4d4d; color: white; }

</style>
</head>

<body>

<header>
    <h2>RemixFit</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Workouts</a>
        <a href="#">Routines</a>
    </nav>
</header>

<div class="container">

    <div class="search-bar">
        <input id="searchInput" placeholder="Search routines..." />
        <button onclick="searchRoutine()">Search</button>
    </div>

    <h2>Routines</h2>

    <div id="routineGrid" class="routine-grid"></div>

</div>

<script>
const API_URL = "http://127.0.0.1:8000";

// FETCH
async function fetchRoutines() {
    const res = await fetch(`${API_URL}/routines`);
    const data = await res.json();
    displayRoutines(data);
}

// DISPLAY
function displayRoutines(routines) {
    const grid = document.getElementById("routineGrid");
    grid.innerHTML = "";

    routines.forEach(r => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${r.name}</h3>
            <span class="tag ${r.difficulty}">${r.difficulty}</span>

            <button class="view-button" onclick="viewRoutine(${r.id})">View</button>
            <button class="rename-button" onclick="renameRoutine(${r.id})">Rename</button>
            <button class="release-button" onclick="deleteRoutine(${r.id})">Delete</button>
        `;

        grid.appendChild(card);
    });
}

// DELETE
async function deleteRoutine(id) {
    await fetch(`${API_URL}/routines/${id}`, { method: "DELETE" });
    fetchRoutines();
}

// RENAME
async function renameRoutine(id) {
    const name = prompt("New name:");
    if (!name) return;

    await fetch(`${API_URL}/routines/${id}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name })
    });

    fetchRoutines();
}

// VIEW
function viewRoutine(id) {
    alert("Viewing routine " + id);
}

// SEARCH
function searchRoutine() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(input)
            ? "block"
            : "none";
    });
}

// LOAD
fetchRoutines();
</script>

</body>
</html>
