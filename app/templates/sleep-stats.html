{% extends "authenticated-base.html" %}

{% block title %}Sleep Stats{% endblock %}

{% block subpage_content %}
    <script src="/static/js/highcharts.js"></script>

    <div class="container">
        <h4 style="margin-top: 100px;">Weekly Sleep Hours</h4>
        <div id="container"></div>
        <div id="summary" style="margin-top: 20px;"></div>
    </div>

    <script>

        function drawChart(categories, values) {
            Highcharts.chart('container', {
                chart: {type: 'column'},
                title: {text: 'Weekly Sleep'},
                xAxis: {categories: categories},
                yAxis: {
                    min:0, 
                    title: {text: 'Hours'},
                    plotLines: [{
                        value: 8,
                        color: 'green',
                        dashStyle: 'ShortDash',
                        width: 2,
                        label: {
                            text:'Sleep Goal (8h)'
                        }
                    }]
                },
                tooltip: {
                    pointFormat: '{point.y} hrs'
                },
                series: [{
                    name:'Sleep',
                    data: buildChartData(values)
                }]
            });
        }

        function buildChartData(values) {
            let res = []

            for (let i = 0; i < values.length; i++) {
                let v = values[i];

                if (v>= 8) {
                    res.push({y: v, color: '#4CAF50'});
                }
                else{
                    res.push({y:v, color: '#ff4d4d'})
                }
            }
            return res;
        }

        function showSummary(values) {
            let total = 0;
            let best = 0;
            let daysMet = 0;

            for (let i = 0; i < values.length; i++) {
                let v = values[i];

                total += v;

                if (v > best) { best = v;}
                if(v >= 8) {daysMet += 1;}
            }

            let avg = Math.round(total/7);

            document.getElementById("summary").innerHTML = `
                <p><strong>Total:</strong> ${total} hrs</p>
                <p><strong>Average:</strong> ${avg} hrs/day</p>
                <p><strong>Best Day:</strong> ${best} hrs</p>
                <p><strong>Goal Met:</strong> ${daysMet}/7 days</p>
            `;
        }

        async function loadChart() {
            let res = await fetch('/sleep/weekly', {credentials: "include"});
            let data = await res.json()

            let categories = [];
            let values = [];
            const order = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

            for (let i = 0; i < order.length; i++) {
                let day = order[i];
                categories.push(day);

                if (data[day] !== undefined) {
                    values.push(data[day]);
                }
                else {
                    values.push(0);
                }
            }

            drawChart(categories, values);
            showSummary(values);
        }

        document.addEventListener("DOMContentLoaded", loadChart);
    </script>
{% endblock %}
